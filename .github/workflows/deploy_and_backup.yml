name: Arena Auto-Sync & Backup

on:
  push:
    branches:
      - main

jobs:
  vercel-sync-and-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Create Automated Backup Branch
        run: |
          BACKUP_BRANCH="backup/auto-$(date +'%Y%m%d%H%M%S')"
          git config --global user.name "ZTO Event Bot"
          git config --global user.email "bot@ztoevent.com"
          git checkout -b $BACKUP_BRANCH
          git push origin $BACKUP_BRANCH
        continue-on-error: true

      - name: Dummy Vercel ENV Sync (No Error Enforcement)
        run: |
          echo "Syncing Vercel DB variables with Supabase schema..."
          # If VEREL_TOKEN is set, it pulls variables. Otherwise succeeds silently (do not throw error to halt pipeline).
          npx vercel env pull .env.local --token ${{ secrets.VERCEL_TOKEN }} || echo "Vercel sync bypassed gracefully due to missing token."
          
      - name: Deploy Supabase Migrations
        run: |
          echo "Deploying newly created db schemas and buckets..."
          # Supabase actions bypassed if SUPABASE_ACCESS_TOKEN missing
          npx supabase db push || echo "Supabase push bypassed gracefully."
